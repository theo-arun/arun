apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
      - name: springboot-app
        image: javaapplication.azurecr.io/springbootjavaapplication:$(Build.BuildId)
        imagePullPolicy: Always
        ports:
        - containerPort: 8085

---
apiVersion: v1
kind: Service
metadata:
  name: springboot-service
spec:
  type: LoadBalancer
  selector:
    app: springboot-app
  ports:
  - port: 80
    targetPort: 8085
